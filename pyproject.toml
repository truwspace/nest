# Python tooling configuration.
#
# This project does NOT publish a Python package — the PyO3 extension is
# built by `cargo build --release -p nest-python` and copied into
# `python/_nest.so`. The Python source under `python/` and `tests/` is
# imported directly by adding `python/` to `sys.path`. No setuptools /
# poetry / pip install path is provided.
#
# This file exists so `ruff` (and any other PEP 518 tool) finds a
# canonical config at the workspace root.

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    "python/__pycache__",
    "**/_nest.so",
    "**/*.dylib",
    "**/*.dll",
]

[tool.ruff.lint]
# E,F = pycodestyle errors + pyflakes
# W   = pycodestyle warnings
# I   = isort
# B   = flake8-bugbear
# UP  = pyupgrade
# SIM = flake8-simplify
select = ["E", "F", "W", "I", "B", "UP", "SIM"]
# `nest` is the package name and is detected by `sys.path.insert`, not
# by a regular install — silence the unused-import false positives that
# come from re-exporting a C extension.
ignore = ["E402", "F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

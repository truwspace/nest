# Rustfmt configuration. Pinning stable-channel defaults explicitly so a
# future rustfmt release that changes a default cannot silently reformat
# the tree. Run via `cargo fmt --all`.
#
# Nightly-only options are deliberately not used so the same `cargo fmt`
# invocation works on stable.
edition = "2024"
hard_tabs = false
tab_spaces = 4
max_width = 100
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
match_block_trailing_comma = false
use_field_init_shorthand = true
